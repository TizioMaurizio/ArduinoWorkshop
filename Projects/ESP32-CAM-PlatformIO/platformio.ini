[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
monitor_speed = 115200
upload_speed = 57600
upload_flags = --before=no_reset
board_build.partitions = huge_app.csv
build_flags =
    -DBOARD_HAS_PSRAM
build_src_filter = +<*> -<elegoo_car_main.cpp> -<uart_scan.cpp> -<wifi_uart_scan.cpp>

lib_deps =

; --- ELEGOO Smart Robot Car V4.0 — ESP32-WROVER on the car --------------------
; Flash via: pio run -e elegoo_car -t upload
; Monitor:   pio device monitor -e elegoo_car
; Board settings match original: ESP32 Dev Module, Huge APP, PSRAM enabled.
[env:elegoo_car]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.partitions = huge_app.csv
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
build_src_filter = +<*> -<main.cpp> -<app_httpd.cpp> -<uart_scan.cpp> -<wifi_uart_scan.cpp>

; --- UART pin scanner (temporary) ---
[env:uart_scan]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
build_src_filter = +<uart_scan.cpp>

; --- WiFi-based UART pin scanner (temporary) ---
[env:wifi_uart_scan]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 460800
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
build_src_filter = +<wifi_uart_scan.cpp>
