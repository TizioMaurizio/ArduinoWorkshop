; SpotController — Arduino UNO servo arm controller
; Receives "<ch>,<angle>\n" from ESP32-CAM via SoftwareSerial (pin 2, 4800 baud)
; Gradually moves servos to target angles via PCA9685

[env:uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library@^2.4.0
